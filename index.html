<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Me Valentine</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            width: 80%;
            max-width: 340px;
            height: 380px; /* Gif එක දාන්න උස වැඩි කළා */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        .gif-container {
            width: 100%;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .gif-container img {
            height: 100%;
            object-fit: contain;
        }
        h2 {
            color: #ff4d6d;
            font-size: 24px;
            margin: 10px 0;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
            height: 50px;
            position: relative;
            margin-bottom: 15px;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }
        #noBtn {
            background-color: #777;
            color: white;
            position: absolute;
            transition: all 0.1s ease;
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <!-- මුලින්ම පෙනෙන Cute Sticker එක -->
    <div class="gif-container">
        <img id="bearGif" src="https://media.tenor.com/al46anu_GcMAAAAi/teddy-bear-cute.gif" alt="Cute Bear">
    </div>
    
    <h2 id="question">ඔයා මට ආදරේ ද?</h2>
    
    <div class="buttons">
        <button id="yesBtn">ඔව්</button>
        <button id="noBtn" style="left: 170px; top: 0px;">නැත</button>
    </div>
</div>

<script>
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const container = document.getElementById('mainContainer');
    const question = document.getElementById('question');
    const bearGif = document.getElementById('bearGif');
    const buttonsDiv = document.querySelector('.buttons');

    // බටන් එක දුවන Function එක
    const moveButton = () => {
        const containerWidth = container.offsetWidth;
        // බටන් එක container එකෙන් සහ උඩ තියෙන Gif එකෙන් පිට පැනීම වැළැක්වීමට සීමා පැනවීම
        const newX = Math.floor(Math.random() * (containerWidth - noBtn.offsetWidth - 40)) + 20;
        const newY = Math.floor(Math.random() * 60) - 20; // බොත්තම් ඇති හරියේ පමණක් සෙලවීමට

        noBtn.style.left = `${newX}px`;
        noBtn.style.top = `${newY}px`;
    };

    noBtn.addEventListener('mouseover', moveButton);
    noBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        moveButton();
    });

    // "ඔව්" ක්ලික් කළ විට වෙනස් වන දේ
    yesBtn.addEventListener('click', () => {
        question.innerHTML = "මං ඒක දන්නවා! ❤️";
        buttonsDiv.style.display = 'none';
        // හාදුවක් දෙන වලස් පැටියෙක්ගේ Sticker එකක් ලෝඩ් කිරීම
        bearGif.src = "https://media.tenor.com/gU_79G8qn6AAAAAi/goma-goma-waving.gif";
    });
</script>

</body>
</html>
