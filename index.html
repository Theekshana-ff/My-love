<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Me Valentine</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            width: 85%;
            max-width: 340px;
            height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        .gif-container {
            width: 100%;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .gif-container img {
            height: 100%;
            max-width: 100%;
            object-fit: contain;
        }
        h2 {
            color: #ff4d6d;
            font-size: 24px;
            margin: 15px 0;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
            height: 50px;
            position: relative;
            margin-bottom: 10px;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }
        #noBtn {
            background-color: #777;
            color: white;
            position: absolute;
            transition: all 0.1s ease;
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <!-- GIPHY ලින්ක් එකක් පාවිච්චි කර ඇත -->
    <div class="gif-container">
        <img id="bearGif" src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExbms5eDRoN3JnZnV5amM1dzg1Ym95b3N6bW13Z3N0OHp0ZndpbnZpciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute Bear">
    </div>
    
    <h2 id="question">ඔයා මට ආදරේ ද?</h2>
    
    <div class="buttons">
        <button id="yesBtn">ඔව්</button>
        <button id="noBtn" style="left: 170px; top: 0px;">නැත</button>
    </div>
</div>

<script>
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const container = document.getElementById('mainContainer');
    const question = document.getElementById('question');
    const bearGif = document.getElementById('bearGif');
    const buttonsDiv = document.querySelector('.buttons');

    const moveButton = () => {
        const containerWidth = container.offsetWidth;
        const newX = Math.floor(Math.random() * (containerWidth - noBtn.offsetWidth - 40)) + 20;
        const newY = Math.floor(Math.random() * 60) - 20;

        noBtn.style.left = `${newX}px`;
        noBtn.style.top = `${newY}px`;
    };

    noBtn.addEventListener('mouseover', moveButton);
    noBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        moveButton();
    });

    yesBtn.addEventListener('click', () => {
        question.innerHTML = "මං ඒක දන්නවා! ❤️";
        buttonsDiv.style.display = 'none';
        // "ඔව්" කිව්වම වැටෙන Happy GIPHY Sticker එක
        bearGif.src = "https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExbWZ6OHg1cHJmMnpxZXE4Y2lreXUzOHJjZTRxeXpxbW1xZnB1NzRxdiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/l0QrZmx6z5fQpI6i0/giphy.gif";
    });
</script>

</body>
</html>
